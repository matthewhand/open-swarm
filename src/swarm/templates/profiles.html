{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8">
  <h2 class="text-2xl font-bold mb-4">LLM Profiles</h2>
  <p class="text-gray-500 mb-6">Profiles detected from project and user config.</p>
  
  <div class="overflow-x-auto">
    <table class="table table-zebra table-compact w-full">
      <thead>
        <tr>
          <th class="bg-base-200">Name</th>
          <th class="bg-base-200">Provider</th>
          <th class="bg-base-200">Model</th>
          <th class="bg-base-200">Base URL</th>
        </tr>
      </thead>
      <tbody>
        {% for p in profiles %}
        <tr>
          <td><code class="bg-base-300 px-2 py-1 rounded">{{ p.name }}</code></td>
          <td>{{ p.provider }}</td>
          <td>{{ p.model }}</td>
          <td class="max-w-xs truncate">
            <a href="{{ p.base_url }}" target="_blank" rel="noopener noreferrer" class="link link-primary truncate">
              {{ p.base_url }}
            </a>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="4" class="text-center text-gray-500 py-4">No profiles found.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
