# fly.toml app configuration file generated for open-swarm on 2025-01-17T22:46:58Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'open-swarm'
primary_region = 'syd'

[build]
  image = 'mhand79/open-swarm'

[env]
  PORT = '8000'
  SWAPFILE_PATH = "/mnt/sqlite_data/swapfile" 

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1 
  processes = ['app']

# HTTP health check temporarily DISABLED (2026-06-20).
# The currently-deployed image (mhand79/open-swarm:latest) has no /health route
# AND its index ("/") 500s with NoReverseMatch: 'cli_agent' — so no path returns
# a clean 200, and a failing check makes fly-proxy stop routing ALL traffic
# (including the working /v1 API). Disabled so the API serves while a fresh image
# is built/released. urls.py now wires /health — RE-ENABLE this check (path=/health,
# Host header below) once an image carrying that route is deployed:
#
# [[http_service.checks]]
#   grace_period = "120s"
#   interval = "30s"
#   timeout = "15s"
#   method = "GET"
#   path = "/health"
#   [http_service.checks.headers]
#     Host = "open-swarm.fly.dev"

[deploy]
wait_timeout = "20m"    # Increase from default 5m
release_command_timeout = "10m"  # For DB migrations/pre-deploy tasks

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source="sqlite_data"
  destination="/mnt/sqlite_data"

